   <div class="secao">
       <h1 class="secao_title">Vamos tirar sua ideia do papel!!!</h1>
       <h3 class="secao_content">
           Preencha o formulário com as suas informações e do seu projeto para que eu possa dar o retorno com uma proposta alinhada ao que você precisa.
       </h3>
   </div>
    
   <form action="mailto:rickelmexb@hotmail.com" method="post" class="form">
        
        <table class="tabela_contratar">
            <thead></thead>
            
            <tbody>
                <tr>
                    <td>
                        <label for="nome" class="title">Nome</label><br>
                        <input type="text" name="nome" id="nome" size="25" maxlength="30" required>
                    </td>
                    <td>
                        <label for="email" class="title">Email</label><br>
                        <input type="email" name="email" id="email" value="" size="25" placeholder="Informe seu email" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="tel" class="title">Telefone</label><br>
                        <input type="tel" id="tel" name="tel" placeholder="+XX (XX)XXXXX-XXXX" required>
                    </td>
                    <td>
                        <label for="" class="title">Pessoa</label><br>
                        <input type="radio" id="opcao" name="opcao" value="fisica" required> <span class="radiotext"> Física</span> <br>
                        <input type="radio" id="opcao" name="opcao" value="juridica" required> <span class="radiotext"> Jurídica</span>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="" class="title">Serviço</label><br>
                        <select name="servicos" size="1" class="tipo_servico" required>
                            <option value=""></option>
                            <option value="basico">Básico</option>
                            <option value="intermediario">Intermediário</option>
                            <option value="avancado">Avançado</option>
                        </select>
                    </td>
                    <td>
                        <label for="hora_contato" class="title">Horário para Contato</label><br>
                        <input type="time" name="hora_contato" id="hora_contato">
                    </td>
                </tr>
                <tr>
                    <td colspan="2">
                        <label for="" class="title">Descrição do que Deseja Contratar</label><br>
                        <textarea name="descricao" id="descricao" cols="70" rows="10"></textarea>
                    </td>
                </tr>
            </tbody>
            
            <tfoot>
                <tr>
                    <td>
                        <input type="submit" value="Contratar" class="btn_2">
                    </td>
                    <td>
                        <input type="reset" value="Limpar" class="btn_2">
                    </td>
                </tr>
            </tfoot>
    
        </table>

        <img src="../midia/gif_contratar.gif" alt="" class="gif_contratar">
    </form>
